# Prometheus Configuration for BlackRoad
# Monitors all API endpoints and alerts on anomalies

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'blackroad-monitoring'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - 'alert_rules.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # BlackRoad Prometheus Exporter
  - job_name: 'blackroad-exporter'
    static_configs:
      - targets: ['localhost:8002']
    scrape_interval: 30s
    metrics_path: '/metrics'

  # Node Exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 30s

  # cAdvisor (Docker container metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['localhost:8080']
    scrape_interval: 30s
