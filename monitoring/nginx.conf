user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;

    upstream billing_api {
        server billing-api:8000;
    }

    upstream admin_dashboard {
        server admin-dashboard:8000;
    }

    upstream analytics_engine {
        server analytics-engine:8000;
    }

    upstream ml_analytics {
        server ml-analytics:8000;
    }

    upstream customer_ui {
        server customer-ui:8000;
    }

    upstream stripe_webhooks {
        server stripe-webhooks:8000;
    }

    upstream onboarding_service {
        server onboarding-service:8000;
    }

    upstream monitoring_system {
        server monitoring-system:8000;
    }

    # Redirect HTTP to HTTPS (in production)
    server {
        listen 80;
        server_name _;
        
        # Health check endpoint
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # API Gateway
        location /api/billing/ {
            limit_req zone=api_limit burst=200 nodelay;
            proxy_pass http://billing_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /api/admin/ {
            limit_req zone=api_limit burst=200 nodelay;
            proxy_pass http://admin_dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/analytics/ {
            limit_req zone=api_limit burst=200 nodelay;
            proxy_pass http://analytics_engine/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ml/ {
            limit_req zone=api_limit burst=200 nodelay;
            proxy_pass http://ml_analytics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/customer/ {
            limit_req zone=api_limit burst=200 nodelay;
            proxy_pass http://customer_ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/webhooks/stripe {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://stripe_webhooks/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/onboarding/ {
            limit_req zone=api_limit burst=200 nodelay;
            proxy_pass http://onboarding_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/monitoring/ {
            limit_req zone=api_limit burst=200 nodelay;
            proxy_pass http://monitoring_system/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend
        location / {
            limit_req zone=general_limit burst=50 nodelay;
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
