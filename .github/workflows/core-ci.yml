    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  guard:
    runs-on: [self-hosted, blackroad-fleet]
    steps:
      - name: Guardrail
        run: echo "✅ CORE repo guardrail active on $(hostname)"

  lint:
    runs-on: [self-hosted, blackroad-fleet]
    steps:
      - uses: actions/checkout@v4
      - name: Lint placeholder
        run: echo "✅ Lint check OK on $(hostname)"
