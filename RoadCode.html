<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoadCode — BlackRoad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* === BRAND TOKENS (from brand-guide-exact.html) === */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --g:linear-gradient(90deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);
  --g135:linear-gradient(135deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);
  --ember:#FF6B2B;--flare:#FF2255;--mag:#CC00AA;--orchid:#8844FF;--arc:#4488FF;--cyan:#00D4FF;
  --bg:#000;--card:#0a0a0a;--elevated:#111;--hover:#181818;--border:#1a1a1a;
  --muted:#444;--sub:#737373;--text:#f5f5f5;--white:#fff;
  --sg:'Space Grotesk',sans-serif;--jb:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sg);font-size:13px;line-height:1.5}
button{font-family:var(--sg);cursor:pointer;background:none;border:none;color:inherit}
input,textarea,select{font-family:var(--sg)}
.mono{font-family:var(--jb)}

/* === APP SHELL === */
.app{display:flex;flex-direction:column;height:100vh;width:100vw}
/* === TOPBAR === */
.topbar{height:44px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:14px;flex-shrink:0;position:relative}
.topbar::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:1px;background:var(--g);opacity:.06}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;color:var(--white)}
.brand-bar{width:22px;height:4px;border-radius:2px;background:var(--g)}
.crumbs{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--sub)}
.crumbs .sep{color:var(--muted);font-size:10px}
.crumbs .cur{color:var(--white);font-weight:500}
.crumbs .branch{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;background:var(--elevated);border:1px solid var(--border);border-radius:4px;font-family:var(--jb);font-size:11px;color:var(--text)}
.cmdk-stub{flex:1;max-width:480px;margin:0 auto;display:flex;align-items:center;gap:10px;height:28px;padding:0 12px;background:var(--elevated);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:12px;cursor:pointer;position:relative;overflow:hidden}
.cmdk-stub::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--g)}
.cmdk-stub:hover{border-color:#333;color:var(--sub)}
.cmdk-stub .kbd{margin-left:auto;padding:1px 6px;background:var(--card);border:1px solid var(--border);border-radius:3px;font-family:var(--jb);font-size:10px;color:var(--sub)}
.build-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--elevated);border:1px solid var(--border);border-radius:4px;font-size:11px;font-weight:500}
.build-pill .dot{width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e}
.build-pill.building .dot{background:var(--ember);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.avatar-stack{display:flex}
.av{width:24px;height:24px;border-radius:50%;background:var(--elevated);border:2px solid var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text);margin-left:-6px}
.av:first-child{margin-left:0}
.av.gr{background:var(--g135);color:#000}
.deploy-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--white);color:#000;border-radius:5px;font-weight:600;font-size:12px}
.deploy-btn:hover{background:#e0e0e0}
.icon-btn{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border-radius:5px;color:var(--sub);font-size:13px}
.icon-btn:hover{background:var(--hover);color:var(--white)}

/* === ACTIVITY RAIL === */
.rail{width:52px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;flex-shrink:0}
.rail-btn{position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--muted);font-size:16px;transition:all .15s}
.rail-btn:hover{color:var(--text);background:var(--hover)}
.rail-btn.active{color:var(--white)}
.rail-btn.active::before{content:'';position:absolute;left:-8px;top:8px;bottom:8px;width:2px;border-radius:2px;background:var(--g)}
.rail-btn .badge{position:absolute;top:4px;right:4px;min-width:14px;height:14px;padding:0 4px;background:var(--flare);border-radius:7px;font-family:var(--jb);font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600}
.rail-tip{position:absolute;left:48px;top:50%;transform:translateY(-50%);background:var(--white);color:#000;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:50}
.rail-btn:hover .rail-tip{opacity:1}
.rail-spacer{flex:1}

/* === SIDEBAR === */
.sidebar{width:260px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-size:11px;font-weight:600;color:var(--white);text-transform:uppercase;letter-spacing:.08em}
.sb-actions{display:flex;gap:2px}
.sb-act{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;color:var(--muted);font-size:12px}
.sb-act:hover{background:var(--hover);color:var(--white)}
.sb-body{flex:1;overflow-y:auto;padding:6px 0}
.sb-section{padding:6px 0}
.sb-section-label{padding:6px 14px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;justify-content:space-between}
.sb-item{display:flex;align-items:center;gap:8px;padding:5px 14px;font-size:13px;color:var(--sub);cursor:pointer;border-left:2px solid transparent}
.sb-item:hover{background:var(--hover);color:var(--text)}
.sb-item.active{background:var(--hover);color:var(--white);border-left-color:var(--arc)}
.sb-item .icon{width:14px;font-size:11px;color:var(--muted);text-align:center}
.sb-item .meta{margin-left:auto;font-family:var(--jb);font-size:10px;color:var(--muted)}
.sb-search{padding:8px 12px}
.sb-search input{width:100%;padding:6px 10px;background:var(--elevated);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;outline:none}
.sb-search input:focus{border-color:var(--arc)}

/* === WORKBENCH === */
.tabbar{height:34px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;padding:0 4px;flex-shrink:0;overflow-x:auto}
.tabbar::-webkit-scrollbar{height:0}
.wb-tab{display:inline-flex;align-items:center;gap:8px;height:34px;padding:0 12px;font-size:12px;color:var(--sub);background:transparent;border-right:1px solid var(--border);cursor:pointer;position:relative;flex-shrink:0;border-top:2px solid transparent}
.wb-tab:hover{color:var(--text)}
.wb-tab.active{background:var(--bg);color:var(--white);border-top-color:var(--arc)}
.wb-tab .ic{font-size:11px;color:var(--cyan)}
.wb-tab .dot{width:6px;height:6px;border-radius:50%;background:var(--white);opacity:0}
.wb-tab.dirty .dot{opacity:1}
.wb-tab .x{margin-left:4px;width:14px;height:14px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);opacity:0}
.wb-tab:hover .x,.wb-tab.active .x{opacity:1}
.wb-tab .x:hover{background:var(--hover);color:var(--white)}
.wb-breadcrumb{height:26px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;font-family:var(--jb);font-size:11px;color:var(--muted);gap:6px;flex-shrink:0}
.wb-breadcrumb .sep{color:#2a2a2a}
.wb-breadcrumb .last{color:var(--text)}
.wb-stage{flex:1;display:flex;min-height:0;background:var(--bg);position:relative;overflow:hidden}

/* === INSPECTOR === */
.inspector{width:280px;background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.inspector.collapsed{width:0;border-left:none}
.insp-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.insp-title{font-size:11px;font-weight:600;color:var(--white);text-transform:uppercase;letter-spacing:.08em}
.insp-body{flex:1;overflow-y:auto;padding:12px 14px}
.insp-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.insp-tab{flex:1;padding:8px;font-size:11px;font-weight:500;color:var(--sub);text-align:center;cursor:pointer;border-bottom:2px solid transparent}
.insp-tab.active{color:var(--white);border-bottom-color:var(--white)}

/* === STATUSBAR === */
.statusbar{height:24px;background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 10px;font-family:var(--jb);font-size:10px;color:var(--sub);gap:14px;flex-shrink:0;position:relative}
.statusbar::before{content:'';position:absolute;left:0;right:0;top:-1px;height:1px;background:var(--g);opacity:.06}
.st-item{display:inline-flex;align-items:center;gap:5px;padding:0 6px;height:20px;border-radius:3px;cursor:pointer;color:var(--sub)}
.st-item:hover{background:var(--hover);color:var(--text)}
.st-item .dot{width:6px;height:6px;border-radius:50%}
.st-item .gr{background:var(--g135);width:6px;height:6px;border-radius:50%}
.st-spacer{flex:1}
.st-err{color:#fca5a5}
.st-warn{color:#fbbf24}

/* === BOTTOM PANEL === */
.bottom-panel{border-top:1px solid var(--border);background:var(--card);height:200px;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.bottom-panel.collapsed{height:0;border-top:none}
.bp-head{height:30px;display:flex;align-items:center;border-bottom:1px solid var(--border);padding:0 4px;flex-shrink:0}
.bp-tab{padding:0 12px;height:30px;display:inline-flex;align-items:center;font-size:11px;font-weight:500;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;gap:6px}
.bp-tab:hover{color:var(--text)}
.bp-tab.active{color:var(--white);border-bottom-color:var(--white)}
.bp-tab .ct{font-family:var(--jb);font-size:10px;background:var(--elevated);padding:1px 5px;border-radius:8px;color:var(--muted)}
.bp-actions{margin-left:auto;display:flex;gap:2px;padding-right:6px}
.bp-body{flex:1;overflow:auto;padding:8px 14px;font-family:var(--jb);font-size:12px;line-height:1.6}

/* === CMD PALETTE OVERLAY === */
.cmd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;padding-top:12vh;z-index:1000}
.cmd-overlay.open{display:flex}
.cmd-palette{background:var(--card);border:1px solid var(--border);border-radius:12px;width:600px;max-width:92vw;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.cmd-grad{height:3px;background:var(--g)}
.cmd-input-wrap{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.cmd-prefix{font-family:var(--jb);font-size:12px;color:var(--muted)}
.cmd-input{flex:1;background:none;border:none;color:var(--white);font-size:14px;outline:none}
.cmd-input::placeholder{color:var(--muted)}
.cmd-results{max-height:380px;overflow-y:auto;padding:6px}
.cmd-group-label{padding:8px 14px 4px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.cmd-item{display:flex;align-items:center;gap:12px;padding:9px 14px;border-radius:6px;cursor:pointer}
.cmd-item.sel,.cmd-item:hover{background:var(--hover)}
.cmd-item-icon{width:18px;font-size:12px;color:var(--muted);text-align:center}
.cmd-item-text{flex:1;font-size:13px;color:var(--text)}
.cmd-item-sub{font-size:11px;color:var(--muted);font-family:var(--jb)}
.cmd-item-kbd{font-family:var(--jb);font-size:10px;color:var(--muted)}
.cmd-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:18px;font-family:var(--jb);font-size:10px;color:var(--muted)}

/* === TOASTS === */
.toast-stack{position:fixed;bottom:40px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:900;max-width:380px}
.toast{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:12px;animation:slideIn .25s ease;box-shadow:0 12px 30px rgba(0,0,0,.5)}
.toast .bar{width:3px;align-self:stretch;border-radius:2px;background:var(--g);flex-shrink:0}
.toast-title{font-weight:600;color:var(--white);margin-bottom:2px}
.toast-text{color:var(--sub);line-height:1.5}
.toast-close{margin-left:8px;color:var(--muted);font-size:13px}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
/* === EDITOR === */
.editor-wrap{flex:1;display:flex;min-width:0;position:relative}
.editor{flex:1;display:flex;font-family:var(--jb);font-size:13px;line-height:1.6;overflow:auto;background:var(--bg)}
.gutter{padding:8px 0;background:var(--bg);user-select:none;flex-shrink:0;border-right:1px solid #0f0f0f}
.gutter-line{display:flex;align-items:center;height:21px;padding:0 8px 0 14px;font-family:var(--jb);font-size:11px;color:var(--muted);justify-content:flex-end;gap:6px;min-width:60px}
.gutter-line.cur{color:var(--text)}
.gutter-line .gd{width:3px;height:21px;border-radius:1px}
.gutter-line .gd.add{background:#22c55e}
.gutter-line .gd.mod{background:var(--ember)}
.gutter-line .gd.del{background:var(--flare)}
.gutter-line .bp{width:8px;height:8px;border-radius:50%;background:var(--flare);box-shadow:0 0 4px var(--flare)}
.code{flex:1;padding:8px 14px;white-space:pre;color:var(--text);min-width:0;outline:none;tab-size:2;position:relative}
.code .cur-line{position:absolute;left:0;right:0;height:21px;background:rgba(255,255,255,.025);pointer-events:none}
.minimap{width:60px;background:var(--card);border-left:1px solid var(--border);overflow:hidden;flex-shrink:0;padding:8px 4px;position:relative}
.mini-line{height:2px;margin-bottom:1px;background:#1a1a1a;border-radius:1px}
.mini-line.has{background:#2a2a2a}
.mini-line.cur{background:var(--arc)}
.mini-viewport{position:absolute;left:0;right:0;height:80px;background:rgba(255,255,255,.04);border:1px solid #2a2a2a;border-radius:2px;pointer-events:none}
.find-bar{position:absolute;top:8px;right:80px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px;display:none;align-items:center;gap:6px;z-index:20;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.find-bar.open{display:flex}
.find-bar input{padding:4px 8px;background:var(--elevated);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;outline:none;width:160px;font-family:var(--jb)}
.find-bar .ct{font-family:var(--jb);font-size:10px;color:var(--muted);padding:0 4px}
/* syntax */
.tk-kw{color:#FF6B2B}.tk-str{color:#00D4FF}.tk-num{color:#8844FF}.tk-com{color:#555;font-style:italic}.tk-fn{color:#4488FF}.tk-tag{color:#FF2255}.tk-attr{color:#CC00AA}.tk-prop{color:#4488FF}.tk-val{color:#00D4FF}.tk-punct{color:#888}.tk-h1{color:#fff;font-weight:600}.tk-md-link{color:#4488FF;text-decoration:underline}
/* file tree */
.tree{padding:4px 0;font-size:13px}
.tnode{display:flex;align-items:center;gap:6px;padding:3px 8px 3px 14px;color:var(--sub);cursor:pointer;user-select:none;position:relative}
.tnode:hover{background:var(--hover);color:var(--text)}
.tnode.active{background:var(--hover);color:var(--white)}
.tnode .chev{width:10px;font-size:9px;color:var(--muted);transition:transform .15s}
.tnode.open .chev{transform:rotate(90deg)}
.tnode .ic{width:14px;font-size:11px;text-align:center}
.tnode .ic.js{color:#FFD93D}.tnode .ic.html{color:#FF6B2B}.tnode .ic.css{color:#4488FF}.tnode .ic.md{color:#fff}.tnode .ic.json{color:#FFD93D}.tnode .ic.dir{color:#4488FF}
.tnode .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tnode .dirty{width:6px;height:6px;border-radius:50%;background:var(--white)}
.tchildren{padding-left:14px;display:none}
.tchildren.open{display:block}

/* === ROADIE (Cursor-style AI) === */
.roadie-wrap{display:flex;flex-direction:column;height:100%}
.roadie-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
.r-msg{display:flex;gap:10px;max-width:100%}
.r-av{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}
.r-av.r{background:var(--g135);color:#000}
.r-av.u{background:var(--elevated);border:1px solid var(--border);color:var(--text)}
.r-body{flex:1;min-width:0}
.r-name{font-size:11px;font-weight:600;color:var(--white);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.r-name .badge{font-family:var(--jb);font-size:9px;color:var(--muted);background:var(--elevated);padding:1px 5px;border-radius:3px}
.r-text{font-size:13px;color:var(--text);line-height:1.6}
.r-text code{font-family:var(--jb);font-size:11px;background:var(--elevated);padding:1px 5px;border-radius:3px;color:var(--cyan)}
.r-text pre{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin:8px 0;font-family:var(--jb);font-size:11px;overflow-x:auto;line-height:1.5}
.r-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.r-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;background:var(--elevated);border:1px solid var(--border);border-radius:3px;font-size:10px;color:var(--sub);font-family:var(--jb)}
.r-quick{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.r-quick button{padding:4px 10px;background:var(--elevated);border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--text)}
.r-quick button:hover{border-color:#333}
.r-composer{border-top:1px solid var(--border);padding:10px 12px;background:var(--card);flex-shrink:0}
.r-input{width:100%;min-height:60px;max-height:200px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;resize:none;font-family:var(--sg)}
.r-input:focus{border-color:#333}
.r-toolbar{display:flex;align-items:center;gap:8px;margin-top:8px}
.r-model{padding:4px 8px;background:var(--elevated);border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--text);font-family:var(--jb)}
.r-send{margin-left:auto;padding:5px 14px;background:var(--white);color:#000;border-radius:5px;font-weight:600;font-size:11px}
.r-send:hover{background:#e0e0e0}
.r-typing{display:inline-flex;gap:3px;padding:2px 0}
.r-typing span{width:5px;height:5px;border-radius:50%;background:var(--sub);animation:bounce 1.2s infinite}
.r-typing span:nth-child(2){animation-delay:.15s}
.r-typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}

/* === WORKSPACES === */
.wsp-grid{padding:18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.wsp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
.wsp-card .grad{height:3px;background:var(--g)}
.wsp-h{padding:14px 16px;display:flex;align-items:center;gap:10px}
.wsp-h .nm{font-weight:600;color:var(--white);font-size:14px;flex:1}
.wsp-st{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;background:var(--elevated);border:1px solid var(--border);border-radius:4px;font-size:10px;font-family:var(--jb);color:var(--text)}
.wsp-st .d{width:6px;height:6px;border-radius:50%}
.wsp-st.run .d{background:#22c55e;box-shadow:0 0 4px #22c55e}
.wsp-st.sleep .d{background:var(--muted)}
.wsp-st.boot .d{background:var(--ember);animation:pulse 1.2s infinite}
.wsp-meta{padding:0 16px 12px;font-size:12px;color:var(--sub)}
.wsp-meta .k{font-family:var(--jb);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.wsp-bar{height:4px;background:var(--elevated);border-radius:2px;overflow:hidden;margin-top:4px}
.wsp-bar .fill{height:100%;background:var(--g);border-radius:2px}
.wsp-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.wsp-btn{padding:5px 12px;background:var(--elevated);border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--text)}
.wsp-btn.primary{background:var(--white);color:#000;border-color:var(--white)}
.wsp-detail{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.wsp-pane{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.wsp-pane h4{font-size:11px;font-weight:600;color:var(--white);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.wsp-table{width:100%;font-size:12px}
.wsp-table th{text-align:left;padding:6px 8px;color:var(--muted);font-family:var(--jb);font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.wsp-table td{padding:8px;border-bottom:1px solid var(--border);font-family:var(--jb);font-size:11px;color:var(--text)}
.wsp-pane pre{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;font-family:var(--jb);font-size:11px;color:var(--text);overflow-x:auto;line-height:1.6}

/* === SANDBOX === */
.sandbox{display:flex;flex-direction:column;height:100%}
.sb-bar{height:34px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0}
.sb-bar .nm{font-weight:600;color:var(--white);font-size:12px}
.sb-bar .vis{font-family:var(--jb);font-size:10px;color:var(--muted);padding:2px 6px;background:var(--elevated);border-radius:3px}
.sb-bar .right{margin-left:auto;display:flex;gap:6px}
.sb-bar button{padding:4px 10px;background:var(--elevated);border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--text)}
.sb-bar button.run{background:var(--white);color:#000;border-color:var(--white)}
.sb-grid{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr 1.5fr;min-height:0}
.sb-pane{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.sb-pane:last-child{border-right:none}
.sb-pane-h{height:28px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-family:var(--jb);font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;gap:6px;flex-shrink:0}
.sb-pane-h .dot{width:6px;height:6px;border-radius:50%}
.sb-pane-h .dot.h{background:var(--ember)}
.sb-pane-h .dot.c{background:var(--arc)}
.sb-pane-h .dot.j{background:var(--cyan)}
.sb-pane-body{flex:1;overflow:auto;background:var(--bg)}
.sb-pane textarea{width:100%;height:100%;background:transparent;color:var(--text);border:none;outline:none;padding:10px 12px;font-family:var(--jb);font-size:12px;resize:none;line-height:1.6}
.sb-preview{flex:1;background:#fff}
.sb-console{height:100px;border-top:1px solid var(--border);background:var(--bg);font-family:var(--jb);font-size:11px;padding:8px 12px;overflow:auto;color:var(--text);flex-shrink:0}
.sb-console .ln{padding:2px 0;color:var(--text)}
.sb-console .ln.err{color:#fca5a5}
.sb-console .ln .pre{color:var(--muted);margin-right:8px}
/* === REPO === */
.repo-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.repo-subnav{display:flex;border-bottom:1px solid var(--border);padding:0 14px;background:var(--card);flex-shrink:0}
.repo-subnav .t{padding:10px 16px;font-size:12px;color:var(--sub);border-bottom:2px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.repo-subnav .t:hover{color:var(--text)}
.repo-subnav .t.active{color:var(--white);border-bottom-color:var(--white)}
.repo-subnav .t .ct{font-family:var(--jb);font-size:10px;color:var(--muted);padding:1px 6px;background:var(--elevated);border-radius:8px}
.repo-body{flex:1;overflow:auto;padding:18px}
.pr-list{display:flex;flex-direction:column;gap:8px}
.pr-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;align-items:flex-start;gap:14px;cursor:pointer}
.pr-row:hover{border-color:#333}
.pr-icon{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.pr-icon.open{background:rgba(34,197,94,.1);color:#22c55e}
.pr-icon.draft{background:var(--elevated);color:var(--muted)}
.pr-icon.merged{background:rgba(136,68,255,.1);color:var(--orchid)}
.pr-main{flex:1;min-width:0}
.pr-title{font-weight:600;color:var(--white);font-size:14px;margin-bottom:4px}
.pr-meta{font-family:var(--jb);font-size:11px;color:var(--muted)}
.pr-meta .br{color:var(--cyan)}
.pr-checks{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);margin-top:4px}
.pr-side{display:flex;flex-direction:column;align-items:flex-end;gap:6px;font-family:var(--jb);font-size:10px;color:var(--muted)}
.pr-diff{font-size:11px}
.pr-diff .add{color:#22c55e}
.pr-diff .del{color:var(--flare)}
.commit-graph{font-family:var(--jb);font-size:11px;color:var(--text);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:14px}
.commit-row{display:flex;align-items:center;gap:14px;padding:6px 0}
.commit-graph-vis{width:30px;flex-shrink:0;display:flex;justify-content:center;position:relative}
.commit-graph-vis .line{position:absolute;top:0;bottom:0;left:50%;width:2px;background:linear-gradient(180deg,var(--orchid),var(--arc))}
.commit-graph-vis .dot{width:8px;height:8px;border-radius:50%;background:var(--white);position:relative;z-index:2;box-shadow:0 0 0 3px var(--card)}
.commit-graph-vis .dot.gr{background:var(--g135)}
.commit-msg{flex:1;color:var(--text)}
.commit-hash{color:var(--cyan)}
.commit-author{color:var(--muted);margin-left:8px}
/* PR diff */
.diff-file{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-top:12px;overflow:hidden}
.diff-h{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-family:var(--jb);font-size:12px;background:var(--elevated)}
.diff-h .nm{color:var(--text);flex:1}
.diff-h .stats .add{color:#22c55e}
.diff-h .stats .del{color:var(--flare)}
.diff-body{font-family:var(--jb);font-size:11px;line-height:1.6}
.diff-row{display:flex;padding:0}
.diff-row .gn{width:50px;text-align:right;padding:0 8px;color:var(--muted);user-select:none;flex-shrink:0;font-size:10px}
.diff-row .ln{flex:1;padding:0 12px;white-space:pre;color:var(--text)}
.diff-row.add{background:rgba(34,197,94,.08)}
.diff-row.add .ln{color:#86efac}
.diff-row.del{background:rgba(255,34,85,.08)}
.diff-row.del .ln{color:#fda4af}
.diff-row.hunk{background:var(--bg);color:var(--orchid);padding:4px 12px;font-size:10px}
.review-thread{background:var(--bg);border-top:1px dashed var(--border);padding:10px 14px;display:flex;gap:10px}
.review-thread .av{width:24px;height:24px}
.review-thread .body{flex:1;font-family:var(--sg);font-size:12px;color:var(--text)}
.review-thread .nm{font-weight:600;color:var(--white);font-size:11px}

/* === DEPLOYS === */
.dpl-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.dpl-h{padding:18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-shrink:0;background:var(--card)}
.dpl-h .nm{font-weight:700;font-size:18px;color:var(--white)}
.dpl-h .url{font-family:var(--jb);font-size:11px;color:var(--cyan)}
.dpl-h .right{margin-left:auto;display:flex;gap:8px}
.dpl-env{display:inline-flex;background:var(--elevated);border:1px solid var(--border);border-radius:5px;padding:2px;gap:0}
.dpl-env button{padding:4px 12px;font-size:11px;color:var(--sub);border-radius:3px}
.dpl-env button.active{background:var(--card);color:var(--white)}
.dpl-body{flex:1;overflow:auto;padding:18px;display:grid;grid-template-columns:1fr 320px;gap:14px}
.dpl-table{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.dpl-row{display:grid;grid-template-columns:90px 1fr 120px 100px 90px;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);align-items:center;font-size:12px;cursor:pointer}
.dpl-row:hover{background:var(--hover)}
.dpl-row:last-child{border-bottom:none}
.dpl-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;font-size:10px;font-family:var(--jb);text-transform:uppercase;letter-spacing:.05em}
.dpl-pill.ready{background:rgba(34,197,94,.1);color:#22c55e}
.dpl-pill.building{background:rgba(255,107,43,.12);color:var(--ember)}
.dpl-pill.failed{background:rgba(255,34,85,.12);color:var(--flare)}
.dpl-pill .d{width:5px;height:5px;border-radius:50%;background:currentColor}
.dpl-pill.building .d{animation:pulse 1.2s infinite}
.dpl-meta{font-family:var(--jb);font-size:10px;color:var(--muted)}
.dpl-side{display:flex;flex-direction:column;gap:14px}
.dpl-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px}
.dpl-card h4{font-size:11px;font-weight:600;color:var(--white);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.dpl-card .row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px;border-bottom:1px solid var(--border)}
.dpl-card .row:last-child{border-bottom:none}
.dpl-card .row .k{color:var(--sub);font-family:var(--jb);font-size:10px}
.dpl-card .row .v{color:var(--text);font-family:var(--jb);font-size:11px}
.dpl-logs{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-family:var(--jb);font-size:10px;line-height:1.6;color:var(--text);max-height:160px;overflow-y:auto;margin-top:8px}
.dpl-logs .l{display:flex;gap:8px;padding:1px 0}
.dpl-logs .l .ts{color:var(--muted);flex-shrink:0}
.dpl-logs .l.warn .msg{color:#fbbf24}
.dpl-logs .l.err .msg{color:#fca5a5}
.dpl-logs .l.ok .msg{color:#86efac}

/* === ISSUES === */
.iss-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.iss-h{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-shrink:0;background:var(--card)}
.iss-h .nm{font-weight:700;font-size:18px;color:var(--white)}
.iss-cycle{flex:1;max-width:320px;display:flex;flex-direction:column;gap:4px}
.iss-cycle .lbl{font-family:var(--jb);font-size:10px;color:var(--muted);display:flex;justify-content:space-between}
.iss-cycle .bar{height:4px;background:var(--elevated);border-radius:2px;overflow:hidden}
.iss-cycle .bar .fill{height:100%;background:var(--g);border-radius:2px}
.iss-h .right{margin-left:auto;display:flex;gap:8px}
.iss-toggle{display:inline-flex;background:var(--elevated);border:1px solid var(--border);border-radius:5px;padding:2px}
.iss-toggle button{padding:4px 10px;font-size:11px;color:var(--sub);border-radius:3px}
.iss-toggle button.active{background:var(--card);color:var(--white)}
.iss-board{flex:1;display:flex;gap:10px;padding:14px;overflow-x:auto;background:var(--bg)}
.iss-col{width:280px;flex-shrink:0;display:flex;flex-direction:column;background:var(--card);border:1px solid var(--border);border-radius:8px;max-height:100%}
.iss-col-h{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.iss-col-h .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
.iss-col-h .dot.todo{background:var(--sub)}
.iss-col-h .dot.prog{background:var(--ember)}
.iss-col-h .dot.rev{background:var(--orchid)}
.iss-col-h .dot.done{background:#22c55e}
.iss-col-h .nm{font-size:12px;font-weight:600;color:var(--white);flex:1}
.iss-col-h .ct{font-family:var(--jb);font-size:10px;color:var(--muted)}
.iss-col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.iss-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;cursor:pointer}
.iss-card:hover{border-color:#333}
.iss-card .top{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-family:var(--jb);font-size:10px;color:var(--muted)}
.iss-card .pri{font-size:11px}
.iss-card .pri.urgent{color:var(--flare)}
.iss-card .pri.high{color:var(--ember)}
.iss-card .pri.med{color:var(--orchid)}
.iss-card .pri.low{color:var(--sub)}
.iss-card .id{color:var(--cyan)}
.iss-card .t{font-size:13px;color:var(--text);line-height:1.4;margin-bottom:8px}
.iss-card .bottom{display:flex;align-items:center;gap:8px;font-family:var(--jb);font-size:10px;color:var(--muted)}
.iss-card .est{padding:1px 6px;background:var(--elevated);border-radius:3px}
.iss-card .lbls{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.iss-card .lbl{padding:1px 6px;border-radius:3px;font-size:9px;font-family:var(--jb);text-transform:lowercase}
.iss-card .av{margin-left:auto}

/* === LIVE === */
.live-wrap{padding:18px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;height:100%}
.live-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
.live-h{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.live-h .dot{width:10px;height:10px;border-radius:50%;background:var(--g135);box-shadow:0 0 8px var(--orchid)}
.live-h .nm{font-weight:600;color:var(--white);font-size:14px;flex:1}
.live-h .ts{font-family:var(--jb);font-size:11px;color:var(--muted)}
.live-actions{display:flex;gap:8px;margin-top:14px}
.live-actions button{padding:6px 12px;background:var(--elevated);border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--text)}
.live-participants{display:flex;flex-direction:column;gap:8px}
.live-p{display:flex;align-items:center;gap:12px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px}
.live-p .ring{width:32px;height:32px;border-radius:50%;background:var(--g135);padding:2px;flex-shrink:0}
.live-p .ring .inner{width:100%;height:100%;border-radius:50%;background:var(--elevated);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text)}
.live-p .body{flex:1;min-width:0}
.live-p .nm{font-size:13px;font-weight:600;color:var(--white)}
.live-p .file{font-family:var(--jb);font-size:11px;color:var(--cyan)}
.live-p .follow{padding:4px 10px;background:var(--elevated);border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--text)}

/* === SETTINGS === */
.set-wrap{display:flex;height:100%;overflow:hidden}
.set-nav{width:200px;border-right:1px solid var(--border);background:var(--card);padding:14px 8px;flex-shrink:0;overflow-y:auto}
.set-nav-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:5px;font-size:13px;color:var(--sub);cursor:pointer}
.set-nav-item:hover{background:var(--hover);color:var(--text)}
.set-nav-item.active{background:var(--hover);color:var(--white);font-weight:500}
.set-body{flex:1;overflow-y:auto;padding:24px 32px;max-width:720px}
.set-section{margin-bottom:32px}
.set-section h3{font-weight:600;font-size:16px;color:var(--white);margin-bottom:6px}
.set-section .desc{font-size:12px;color:var(--sub);margin-bottom:16px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.set-row:last-child{border-bottom:none}
.set-row .label{font-size:13px;color:var(--text);font-weight:500}
.set-row .sub{font-size:11px;color:var(--muted);margin-top:2px}
.set-input{padding:7px 11px;background:var(--elevated);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;outline:none;min-width:200px}
.toggle{position:relative;width:34px;height:20px;display:inline-block}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--elevated);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:.2s}
.toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:var(--sub);border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--elevated);border-color:#333}
.toggle input:checked+.toggle-slider::before{transform:translateX(14px);background:var(--white)}
.set-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;position:relative;overflow:hidden}
.set-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--g)}
.rp-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.rp-row:last-child{border-bottom:none}
.rp-row .v{font-family:var(--jb);color:var(--text)}

/* === COMMON === */
.scroll-y{overflow-y:auto}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:5px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#2a2a2a}
.kbd{display:inline-flex;align-items:center;padding:1px 6px;background:var(--elevated);border:1px solid var(--border);border-radius:3px;font-family:var(--jb);font-size:10px;color:var(--sub)}
.empty{padding:60px 20px;text-align:center;color:var(--sub)}
.empty .icon{width:50px;height:50px;border-radius:50%;background:var(--elevated);border:1px solid var(--border);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted)}
.empty .t{font-weight:600;font-size:14px;color:var(--white);margin-bottom:6px}
.empty .d{font-size:12px}
.outline-list{list-style:none;font-size:12px}
.outline-list li{padding:4px 0;display:flex;align-items:center;gap:8px;color:var(--sub);cursor:pointer}
.outline-list li:hover{color:var(--text)}
.outline-list li .ic{width:14px;text-align:center;font-size:10px}
.outline-list li .ic.fn{color:var(--arc)}
.outline-list li .ic.cls{color:var(--ember)}
.outline-list li .ic.var{color:var(--cyan)}
.term{font-family:var(--jb);font-size:12px;color:var(--text);line-height:1.6}
.term .prompt{color:var(--cyan)}
.term .out{color:var(--sub)}
.term .ok{color:#86efac}
.term .err{color:#fca5a5}
</style>

  </header>
  <div class="main-row" style="flex:1;display:flex;min-height:0">

      <div class="wb-breadcrumb" id="wbCrumb"></div>

const KW = new Set(['const','let','var','function','return','if','else','for','while','await','async','import','from','export','default','class','extends','new','this','try','catch','finally','throw','typeof','instanceof','in','of','true','false','null','undefined','break','continue','case','switch','do','yield','static','get','set','as','void']);

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function hlJS(src){
  // Tokenize avoiding bleed. Walk char by char.
  let out = '', i = 0, n = src.length;
  while (i < n) {
    const c = src[i], c2 = src.substr(i,2);
    // line comment
    if (c2 === '//') {
      let j = src.indexOf('\n', i);
      if (j === -1) j = n;
      out += '<span class="tk-com">' + escHtml(src.slice(i,j)) + '</span>';
      i = j;
      continue;
    }
    // block comment
    if (c2 === '/*') {
      let j = src.indexOf('*/', i+2);
      if (j === -1) j = n; else j += 2;
      out += '<span class="tk-com">' + escHtml(src.slice(i,j)) + '</span>';
      i = j;
      continue;
    }
    // strings
    if (c === '"' || c === "'" || c === '`') {
      const q = c;
      let j = i + 1;
      while (j < n) {
        if (src[j] === '\\') { j += 2; continue; }
        if (src[j] === q) { j++; break; }
        j++;
      }
      out += '<span class="tk-str">' + escHtml(src.slice(i,j)) + '</span>';
      i = j;
      continue;
    }
    // numbers
    if (/[0-9]/.test(c) && (i===0 || /[^\w]/.test(src[i-1]))) {
      let j = i;
      while (j < n && /[0-9.xXa-fA-F_]/.test(src[j])) j++;
      out += '<span class="tk-num">' + escHtml(src.slice(i,j)) + '</span>';
      i = j;
      continue;
    }
    // identifier
    if (/[A-Za-z_$]/.test(c)) {
      let j = i;
      while (j < n && /[\w$]/.test(src[j])) j++;
      const word = src.slice(i,j);
      // peek next non-space
      let k = j;
      while (k < n && /\s/.test(src[k])) k++;
      if (KW.has(word)) {
        out += '<span class="tk-kw">' + word + '</span>';
      } else if (src[k] === '(') {
        out += '<span class="tk-fn">' + word + '</span>';
      } else {
        out += escHtml(word);
      }
      i = j;
      continue;
    }
    // punctuation
    if (/[{}()\[\];,.]/.test(c)) {
      out += '<span class="tk-punct">' + escHtml(c) + '</span>';
      i++;
      continue;
    }
    out += escHtml(c);
    i++;
  }
  return out;
}

function hlHTML(src){
  // tags + attrs + strings + content
  let out = '', i = 0, n = src.length;
  while (i < n) {
    if (src.substr(i,4) === '<!--') {
      let j = src.indexOf('-->', i+4);
      if (j === -1) j = n; else j += 3;
      out += '<span class="tk-com">' + escHtml(src.slice(i,j)) + '</span>';
      i = j;
      continue;
    }
    if (src[i] === '<') {
      let j = src.indexOf('>', i);
      if (j === -1) j = n; else j += 1;
      let tag = src.slice(i, j);
      // colorize attrs and tag name
      let html = '<span class="tk-punct">' + escHtml(tag[0]) + '</span>';
      let rest = tag.slice(1, -1);
      let m = rest.match(/^\/?([\w-]+)/);
      if (m) {
        html += escHtml(rest.slice(0, m[0].length - m[1].length))
             + '<span class="tk-tag">' + m[1] + '</span>';
        let after = rest.slice(m[0].length);
        // attrs
        after = after.replace(/([\w:-]+)(=)("[^"]*"|'[^']*')/g, (a,k,eq,v) =>
          '<span class="tk-attr">'+k+'</span>'+'<span class="tk-punct">=</span>'+'<span class="tk-str">'+escHtml(v)+'</span>'
        ).replace(/([\w:-]+)(?!=)/g, '<span class="tk-attr">$1</span>');
        html += after;
      } else {
        html += escHtml(rest);
      }
      html += '<span class="tk-punct">&gt;</span>';
      out += html;
      i = j;
      continue;
    }
    let j = src.indexOf('<', i);
    if (j === -1) j = n;
    out += escHtml(src.slice(i,j));
    i = j;
  }
  return out;
}

function hlCSS(src){
  // selectors, props, values, comments, strings
  return escHtml(src)
    .replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="tk-com">$1</span>')
    .replace(/([{};])/g, '<span class="tk-punct">$1</span>')
    .replace(/([a-z-]+)(\s*:)/gi, '<span class="tk-prop">$1</span>$2')
    .replace(/(:\s*)([^;{}\n<]+)/g, (a,b,v) => b + '<span class="tk-val">' + v + '</span>')
    .replace(/(#[0-9a-fA-F]{3,8}\b)/g, '<span class="tk-num">$1</span>');
}

function hlJSON(src){
  return escHtml(src)
    .replace(/("(?:[^"\\]|\\.)*")(\s*:)/g, '<span class="tk-attr">$1</span>$2')
    .replace(/:(\s*)("(?:[^"\\]|\\.)*")/g, ':$1<span class="tk-str">$2</span>')
    .replace(/\b(true|false|null)\b/g, '<span class="tk-kw">$1</span>')
    .replace(/(-?\b\d+(\.\d+)?\b)/g, '<span class="tk-num">$1</span>');
}

function hlMD(src){
  return escHtml(src)
    .replace(/^(#+)\s+(.*)$/gm, (a,h,t) => '<span class="tk-h1">'+h+' '+t+'</span>')
    .replace(/(`[^`]+`)/g, '<span class="tk-str">$1</span>')
    .replace(/\*\*([^*]+)\*\*/g, '<span class="tk-kw">**$1**</span>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<span class="tk-md-link">[$1]($2)</span>');
}

function highlight(src, ext){
  if (ext === 'js' || ext === 'mjs' || ext === 'ts') return hlJS(src);
  if (ext === 'html') return hlHTML(src);
  if (ext === 'css')  return hlCSS(src);
  if (ext === 'json') return hlJSON(src);
  if (ext === 'md')   return hlMD(src);
  return escHtml(src);
}

function extOf(path){
  const m = path.match(/\.([a-z0-9]+)$/i);
  return m ? m[1].toLowerCase() : '';
}

function renderOutline(){
  const path = STATE.activeTab;
  if (!path || extOf(path) !== 'js') {
    return `<div class="empty" style="padding:20px"><div class="t">No symbols</div><div class="d">Open a JS file to see its outline.</div></div>`;
  }
  const src = FILES[path] || '';
  const items = [];
  src.split('\n').forEach((ln, i) => {
    let m = ln.match(/(?:export\s+)?(?:async\s+)?function\*?\s+(\w+)/);
    if (m) items.push({k:'fn', n:m[1], l:i+1});
    m = ln.match(/class\s+(\w+)/);
    if (m) items.push({k:'cls', n:m[1], l:i+1});
    m = ln.match(/(?:const|let|var)\s+(\w+)\s*=/);
    if (m) items.push({k:'var', n:m[1], l:i+1});
  });
  if (!items.length) return `<div class="empty" style="padding:20px"><div class="t">No symbols</div></div>`;
  return `<ul class="outline-list">${items.map(it =>
    `<li><span class="ic ${it.k}">${it.k==='fn'?'ƒ':it.k==='cls'?'◇':'◌'}</span> ${it.n}<span class="mono" style="margin-left:auto;font-size:10px;color:var(--muted)">L${it.l}</span></li>`
  ).join('')}</ul>`;
}

function renderFileTree(){
  const el = $('fileTree');
  if (!el) return;
  function walk(nodes, depth){
    return nodes.map(n => {
      if (n.type === 'dir') {
        const open = STATE.treeOpen.has(n.name);
        return `<div class="tnode ${open?'open':''}" data-dir="${n.name}" style="padding-left:${4+depth*12}px">
          <span class="chev">▶</span><span class="ic dir">▢</span><span class="nm">${n.name}</span>
        </div>
        <div class="tchildren ${open?'open':''}">${walk(n.children, depth+1)}</div>`;
      } else {
        const ext = extOf(n.path);
        const isActive = n.path === STATE.activeTab;
        const dirty = STATE.dirty.has(n.path);
        return `<div class="tnode ${isActive?'active':''}" data-file="${n.path}" style="padding-left:${18+depth*12}px">
          <span class="ic ${ext}">${ext==='js'?'JS':ext==='html'?'<>':ext==='css'?'#':ext==='md'?'M':ext==='json'?'{}':'·'}</span>
          <span class="nm">${n.name}</span>
          ${dirty?'<span class="dirty"></span>':''}
        </div>`;
      }
    }).join('');
  }
  el.innerHTML = walk(FILE_TREE, 0);
  el.querySelectorAll('[data-file]').forEach(t => {
    t.onclick = () => {
      const p = t.dataset.file;
      if (!STATE.openTabs.includes(p)) STATE.openTabs.push(p);
      STATE.activeTab = p;
      render();
    };
  });
  el.querySelectorAll('[data-dir]').forEach(t => {
    t.onclick = () => {
      const n = t.dataset.dir;
      if (STATE.treeOpen.has(n)) STATE.treeOpen.delete(n); else STATE.treeOpen.add(n);
      renderFileTree();
    };
  });
}

    return;
  }
  const src = FILES[path] || '';
  const ext = extOf(path);
  const lines = src.split('\n');
  const cur = STATE.cursorLine;
  const diffMarks = (path === 'src/app.js')
    ? {14:'mod', 15:'mod', 18:'add'}
    : (path === 'src/auth.js') ? {9:'mod'} : {};
  const breakpoints = (path === 'src/app.js') ? new Set([14]) : new Set();

  const gutter = lines.map((_, i) => {

function mdInline(s){
  return escHtml(s)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function sendRoadieMessage(){
  const input = $('rInput');
  const txt = input.value.trim();
  if (!txt) return;
  STATE.roadie.msgs.push({who:'u', name:'alexa', body: txt});
  input.value = '';
  STATE.roadie.typing = true;
  renderRoadie($('wbStage'));
  // mock streaming response
  setTimeout(() => {
    STATE.roadie.typing = false;
    const reply = mockRoadieReply(txt);
    STATE.roadie.msgs.push(reply);
    renderRoadie($('wbStage'));
    pushToast('Roadie', 'Response complete · ' + STATE.roadie.model);
  }, 1400);
}

function mockRoadieReply(prompt){
  const p = prompt.toLowerCase();
  if (p.includes('test')) {
    return {who:'r', name:'Roadie', body:`Here's a test that aborts mid-stream:`, code:`test('chat() aborts when signal fires', async () => {
  const controller = new AbortController();
  const it = chat('hi', { signal: controller.signal });
  const first = await it.next();
  expect(first.done).toBe(false);
  controller.abort();
  const next = await it.next();
  expect(next.done).toBe(true);
});`, quick:['Apply','Run','Discard']};
  }
  if (p.includes('explain')) {
    return {who:'r', name:'Roadie', body:`The async generator yields decoded chunks until the stream ends. Wrapping in try/catch lets us swallow \`AbortError\` cleanly so callers see a normal completion when they cancel.`};
  }
  return {who:'r', name:'Roadie', body:`Got it. What I'd do:\n\n1. Look at where \`chat()\` is consumed in the UI\n2. Surface the AbortController to the cancel button\n3. Add a debounce so rapid prompts don't pile up streams\n\nWant me to draft the UI wiring?`, quick:['Yes — draft','Just the test','Skip']};
}

function renderRepoPulls(){
  if (STATE.activePR) {
    const pr = PRS.find(p => p.id === STATE.activePR);
    if (pr && pr.files.length) return renderPRDetail(pr);
  }
  return `<div class="pr-list">
    ${PRS.map(pr => `<div class="pr-row" data-pr="${pr.id}">
      <div class="pr-icon ${pr.status}">${pr.status==='open'?'⊙':pr.status==='draft'?'◌':'⬢'}</div>
      <div class="pr-main">
        <div class="pr-title">${escHtml(pr.title)} <span style="color:var(--muted);font-weight:400">#${pr.num}</span></div>
        <div class="pr-meta"><span class="br">⎇ ${pr.branch}</span> · ${pr.author} · ${pr.time}</div>
        <div class="pr-checks">✓ ${pr.checks} checks · <span class="pr-diff"><span class="add">+${pr.diff.add}</span> <span class="del">-${pr.diff.del}</span></span></div>
      </div>
      <div class="pr-side">
        <div class="avatar-stack"><span class="av gr">OC</span><span class="av">CE</span></div>
      </div>
    </div>`).join('')}
  </div>`;
}

function renderPRDetail(pr){
  const files = pr.files.map(f => `
    <div class="diff-file">
      <div class="diff-h">
        <span class="nm">${f.name}</span>
        <span class="stats"><span class="add">+${f.add}</span> <span class="del">-${f.del}</span></span>
        <button class="icon-btn" style="margin-left:auto;width:22px;height:22px">⋯</button>
      </div>
      <div class="diff-body">
        ${f.hunks.map(h => `
          <div class="diff-row hunk">${escHtml(h.h)}</div>
          ${h.lines.map(ln => `<div class="diff-row ${ln.t==='add'?'add':ln.t==='del'?'del':''}">
            <span class="gn">${ln.n}</span><span class="ln">${ln.t==='add'?'+':ln.t==='del'?'-':' '} ${escHtml(ln.l)}</span>
          </div>`).join('')}
        `).join('')}
        ${f.reviews.map(r => `<div class="review-thread">
          <div class="av gr">${r.who.slice(0,2).toUpperCase()}</div>
          <div class="body"><div class="nm">${r.who}</div><div>${escHtml(r.body)}</div>
            <div style="display:flex;gap:6px;margin-top:6px"><button class="wsp-btn">Reply</button><button class="wsp-btn">Resolve</button></div>
          </div>
        </div>`).join('')}
      </div>
    </div>`).join('');
  return `
    <div style="margin-bottom:16px">
      <button class="wsp-btn" id="prBack" style="margin-bottom:10px">← All pull requests</button>
      <div style="display:flex;align-items:flex-start;gap:14px">
        <div class="pr-icon ${pr.status}" style="width:36px;height:36px">${pr.status==='open'?'⊙':'◌'}</div>
        <div style="flex:1">
          <h2 style="font-size:20px;font-weight:600;color:var(--white)">${escHtml(pr.title)} <span style="color:var(--muted);font-weight:400">#${pr.num}</span></h2>
          <div class="pr-meta" style="margin-top:6px">${pr.author} wants to merge <span class="br">⎇ ${pr.branch}</span> into <span class="br">⎇ main</span> · ${pr.time}</div>
        </div>
        <button class="deploy-btn">Merge ▾</button>
      </div>
    </div>
    ${files}
    <script>document.getElementById('prBack').onclick = () => { STATE.activePR = null; render(); };<\/script>`;
}

// ============================================================
function cmdItems(q){
  const items = [];
  // commands
  SPACES.forEach(s => items.push({k:'cmd', t:'Switch to ' + s.tip, sub:'Space', ic:s.ic, run:() => { switchSpace(s.id); }}));
  items.push({k:'cmd', t:'Toggle bottom panel', sub:'View', ic:'⊟', kbd:'⌘J', run:() => { STATE.bottomOpen = !STATE.bottomOpen; render(); }});
  items.push({k:'cmd', t:'Toggle inspector', sub:'View', ic:'⊞', kbd:'⌘B', run:() => { STATE.inspectorOpen = !STATE.inspectorOpen; render(); }});
  items.push({k:'cmd', t:'Run dev server', sub:'Workspace', ic:'▶', run:() => pushToast('Workspace', 'roadcode dev started on :3000')});
  items.push({k:'cmd', t:'Deploy to production', sub:'Deploy', ic:'▲', run:() => pushToast('Deploy', 'Building feat/roadie-streaming → production')});
  items.push({k:'cmd', t:'Anchor to RoadChain', sub:'Chain', ic:'⛓', run:() => pushToast('RoadChain', 'Receipt rcdy_8a2c91d anchored')});
  items.push({k:'cmd', t:'Open Roadie thread…', sub:'Roadie', ic:'✦', run:() => switchSpace('roadie')});
  items.push({k:'cmd', t:'Create new issue', sub:'Issues', ic:'⊕', kbd:'C', run:() => { switchSpace('issues'); pushToast('Issues','New issue draft opened'); }});
  items.push({k:'cmd', t:'Format document', sub:'Editor', ic:'⌘', run:() => pushToast('Editor','Formatted in 3ms')});
  items.push({k:'cmd', t:'Find in repo', sub:'Search', ic:'⌕', kbd:'⌘⇧F', run:() => pushToast('Search','Indexing 8 files…')});
  // files
  Object.keys(FILES).forEach(p => items.push({k:'file', t:p, sub:'File', ic:'⟨/⟩', run:() => { if (!STATE.openTabs.includes(p)) STATE.openTabs.push(p); STATE.activeTab = p; switchSpace('editor'); }}));
  // PRs
  PRS.forEach(pr => items.push({k:'pr', t:`#${pr.num} ${pr.title}`, sub:'Pull request', ic:'⊙', run:() => { STATE.activePR = pr.id; STATE.repoSubtab='pulls'; switchSpace('repo'); }}));
  // Issues
  ISSUES.forEach(i => items.push({k:'iss', t:`${i.id} ${i.title}`, sub:'Issue', ic:'◉', run:() => { switchSpace('issues'); }}));
  // Deploys
  DEPLOYS.forEach(d => items.push({k:'dep', t:`${d.commit} ${d.msg}`, sub:'Deploy · ' + d.env, ic:'▲', run:() => { STATE.activeDeploy = d.id; STATE.deployEnv = d.env; switchSpace('deploys'); }}));

  if (!q) return items.slice(0, 12);
  const ql = q.toLowerCase();
  return items.filter(it => it.t.toLowerCase().includes(ql) || it.sub.toLowerCase().includes(ql)).slice(0, 24);
}

function renderCmdResults(){
  const items = cmdItems(STATE.cmdQuery);
  if (STATE.cmdSel >= items.length) STATE.cmdSel = 0;
  const groups = {};
  items.forEach((it,i) => { (groups[it.sub] = groups[it.sub] || []).push({...it, _i:i}); });
  const html = Object.keys(groups).map(g =>
    `<div class="cmd-group-label">${g}</div>` +
    groups[g].map(it =>
      `<div class="cmd-item ${it._i===STATE.cmdSel?'sel':''}" data-i="${it._i}">
        <span class="cmd-item-icon">${it.ic}</span>
        <span class="cmd-item-text">${escHtml(it.t)}</span>
        ${it.kbd?`<span class="cmd-item-kbd">${it.kbd}</span>`:''}
      </div>`
    ).join('')
  ).join('');
  $('cmdResults').innerHTML = html || `<div class="empty"><div class="t">No matches</div></div>`;
  $('cmdResults').querySelectorAll('[data-i]').forEach(el => {
    el.onclick = () => { items[+el.dataset.i].run(); closeCmd(); };
  });
}

function openCmd(){
  STATE.cmdOpen = true; STATE.cmdQuery=''; STATE.cmdSel=0;
  $('cmdOverlay').classList.add('open');
  $('cmdInput').value = ''; renderCmdResults();
  setTimeout(() => $('cmdInput').focus(), 30);
}
function closeCmd(){ STATE.cmdOpen=false; $('cmdOverlay').classList.remove('open'); }

// ============================================================
// TOASTS
// ============================================================
function pushToast(title, text){
  const id = 't' + Date.now() + Math.random().toString(36).slice(2,5);
  const el = document.createElement('div');
  el.className = 'toast'; el.id = id;
  el.innerHTML = `<span class="bar"></span><div style="flex:1"><div class="toast-title">${escHtml(title)}</div><div class="toast-text">${escHtml(text)}</div></div><button class="toast-close" onclick="document.getElementById('${id}').remove()">×</button>`;
  $('toastStack').appendChild(el);
  setTimeout(() => { const t = document.getElementById(id); if (t) t.remove(); }, 4500);
}

// ============================================================
// KEYBOARD
// ============================================================
function setupKeyboard(){
  document.addEventListener('keydown', e => {
    const meta = e.metaKey || e.ctrlKey;
    // command palette
    if (meta && e.key === 'k') { e.preventDefault(); STATE.cmdOpen ? closeCmd() : openCmd(); return; }
    if (meta && e.key === 'p' && !e.shiftKey) { e.preventDefault(); openCmd(); $('cmdInput').value = ''; STATE.cmdQuery=''; renderCmdResults(); return; }
    if (e.key === 'Escape' && STATE.cmdOpen) { closeCmd(); return; }
    if (STATE.cmdOpen) {
      if (e.key === 'ArrowDown') { e.preventDefault(); STATE.cmdSel++; renderCmdResults(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); STATE.cmdSel = Math.max(0, STATE.cmdSel-1); renderCmdResults(); }
      else if (e.key === 'Enter') {
        e.preventDefault();
        const items = cmdItems(STATE.cmdQuery);
        if (items[STATE.cmdSel]) { items[STATE.cmdSel].run(); closeCmd(); }
      }
      return;
    }
    // global toggles
    if (meta && e.key === 'b') { e.preventDefault(); STATE.inspectorOpen = !STATE.inspectorOpen; render(); return; }
    if (meta && e.key === 'j') { e.preventDefault(); STATE.bottomOpen = !STATE.bottomOpen; renderBottomPanel(); return; }
    if (meta && e.key === 'f' && STATE.space === 'editor') { e.preventDefault(); const fb = $('findBar'); if (fb) { fb.classList.add('open'); fb.querySelector('input').focus(); } return; }
    // C in issues space → new issue
    if (e.key === 'c' && STATE.space === 'issues' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      pushToast('New issue', 'Issue draft opened');
    }
  });
  $('cmdInput').addEventListener('input', e => { STATE.cmdQuery = e.target.value; STATE.cmdSel=0; renderCmdResults(); });
  $('cmdkStub').onclick = openCmd;
  $('cmdOverlay').addEventListener('click', e => { if (e.target.id === 'cmdOverlay') closeCmd(); });
}

// ============================================================
// INIT
// ============================================================
function init(){
  // top bar avatars
  $('topAvatars').innerHTML = `<span class="av gr">AL</span><span class="av">OC</span><span class="av">CE</span>`;
  $('inspToggle').onclick = () => { STATE.inspectorOpen = !STATE.inspectorOpen; render(); };
  $('deployBtn').onclick = () => { STATE.space='deploys'; render(); pushToast('Deploy','Switching to Deploys'); };
  setupKeyboard();
  render();
  // simulate live deploy progressing
  setTimeout(() => {
    DEPLOYS[0].status = 'ready';
    DEPLOYS[0].dur = '53s';
    DEPLOYS[0].time = 'just now';
    pushToast('Deploy ready', 'feat/roadie-streaming → production · 53s');
    if (STATE.space === 'deploys') render();
    const bp = $('buildPill'); if (bp) { bp.classList.remove('building'); $('buildText').textContent='Build passing'; }
  }, 9000);
  // welcome toast
  setTimeout(() => pushToast('Welcome to RoadCode', 'Press ⌘K for the command palette · 9 Spaces in the rail.'), 600);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
