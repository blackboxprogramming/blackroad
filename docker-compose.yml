version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: blackroad-db
    environment:
      POSTGRES_USER: blackroad
      POSTGRES_PASSWORD: dev-password
      POSTGRES_DB: blackroad_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackroad"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blackroad-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackroad-api
    environment:
      DATABASE_URL: postgresql://blackroad:dev-password@postgres:5432/blackroad_dev
      REDIS_URL: redis://redis:6379
      CLERK_API_KEY: ${CLERK_API_KEY:-test-key}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_fake}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_test_fake}
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - .:/app

  admin-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackroad-admin
    environment:
      DATABASE_URL: postgresql://blackroad:dev-password@postgres:5432/blackroad_dev
      ADMIN_TOKEN: dev-admin-token-change-in-prod
      LOG_LEVEL: INFO
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/admin/ping", "-H", "Authorization: Bearer dev-admin-token-change-in-prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - .:/app
    command: python3 admin_dashboard.py

  # Optional: pgAdmin for database inspection
  pgadmin:
    image: dpage/pgadmin4
    container_name: blackroad-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@blackroad.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  default:
    name: blackroad-network
