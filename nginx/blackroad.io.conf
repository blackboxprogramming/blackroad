# -------- Catch-all HTTP (drop scanners) --------
server {
  listen 80 default_server;
  listen [::]:80 default_server;
  return 444;
}

# -------- HTTP redirect to HTTPS --------
server {
  listen 80;
  listen [::]:80;
  server_name blackroad.io www.blackroad.io;
  return 301 https://$host$request_uri;
}

# ----------------------- Main HTTPS site -----------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name blackroad.io www.blackroad.io;

  # Certbot / TLS
  ssl_certificate     /etc/letsencrypt/live/blackroad.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/blackroad.io/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  root /var/www/prism;
  index index.html;

  # Security / perf
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-XSS-Protection "1; mode=block";
  client_max_body_size 10m;
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Block dotfiles & secrets
  location ~ /\.(?!well-known) { deny all; }
  location ~* /(aws|\.aws|\.env|appsettings\.json|config\.php) { deny all; }

  # robots (optional)
  location = /robots.txt { return 200 "User-agent: *\nDisallow:\n"; }

  # SPA
  location / { try_files $uri /index.html; }

  # Static cache
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 7d; access_log off;
  }

  # API — keep /api prefix
  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
  }

  # WebSocket
  location /ws {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  # Local Lucidia LLM via llama.cpp (OpenAI-compatible) on 8083
  location /llm/ {
    proxy_pass http://127.0.0.1:8083/;
    proxy_buffering off;
    proxy_read_timeout 3600;
  }
}
