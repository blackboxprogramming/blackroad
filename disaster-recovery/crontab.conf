# BlackRoad Automated Backup & Maintenance Schedule
# Install with: crontab disaster-recovery/crontab.conf
# View installed cron: crontab -l

# BACKUP SCHEDULE
# ===============

# Daily full backup at 2:00 AM UTC
0 2 * * * cd /Users/alexa/blackroad && ./disaster-recovery.sh backup-all >> logs/backup.log 2>&1

# Weekly restore test (every Sunday at 3:00 AM UTC)
0 3 * * 0 cd /Users/alexa/blackroad && ./disaster-recovery.sh test-restore >> logs/restore-test.log 2>&1

# Monthly backup cleanup (1st of month at 4:00 AM UTC)
0 4 1 * * cd /Users/alexa/blackroad && ./disaster-recovery.sh cleanup >> logs/backup-cleanup.log 2>&1

# Backup verification (daily at 3:15 AM UTC, 15 minutes after backup)
15 3 * * * cd /Users/alexa/blackroad && ./disaster-recovery.sh verify >> logs/backup-verify.log 2>&1

# Daily backup status report (every day at 6:00 AM UTC)
0 6 * * * cd /Users/alexa/blackroad && ./disaster-recovery.sh status >> logs/backup-status.log 2>&1

# MONITORING SCHEDULE
# ===================

# Health check every 5 minutes
*/5 * * * * cd /Users/alexa/blackroad && ./disaster-recovery.sh health >> logs/health-check.log 2>&1

# Send backup status to monitoring system (daily at noon)
0 12 * * * cd /Users/alexa/blackroad && ./blackroad-cli.sh backups status >> logs/monitoring.log 2>&1

# MAINTENANCE SCHEDULE
# ====================

# Database optimization (monthly on the 15th at 5:00 AM)
0 5 15 * * cd /Users/alexa/blackroad && docker exec postgres pg_repack -d roaddb >> logs/db-repack.log 2>&1

# Vacuum analyze (weekly on Wednesday at 5:00 AM)
0 5 * * 3 cd /Users/alexa/blackroad && docker exec postgres vacuumdb -z roaddb >> logs/db-vacuum.log 2>&1

# Docker system prune (monthly on the 1st at 6:00 AM)
0 6 1 * * docker system prune -f >> logs/docker-prune.log 2>&1

# Log rotation (daily at 1:00 AM)
0 1 * * * logrotate -f /Users/alexa/blackroad/disaster-recovery/logrotate.conf >> logs/logrotate.log 2>&1
