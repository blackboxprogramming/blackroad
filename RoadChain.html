<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoadChain — Ledger & Provenance</title>
<meta name="description" content="RoadChain — verifiable receipts for the road.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --g:linear-gradient(90deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);
  --g135:linear-gradient(135deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);
  --gv:linear-gradient(180deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);
  --bg:#000;--card:#0a0a0a;--elevated:#111;--hover:#181818;--border:#1a1a1a;
  --muted:#444;--sub:#737373;--text:#f5f5f5;--white:#fff;
  --green:#3fb950;--red:#f85149;--yellow:#d29922;
  --sg:'Space Grotesk',sans-serif;--jb:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sg);line-height:1.6;overflow:hidden}
button{font-family:var(--sg);cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:var(--sg)}
a{color:var(--text);text-decoration:none}

.app{display:grid;grid-template-rows:auto 1fr auto;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--card);border-bottom:1px solid var(--border);position:relative}
.topbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--g);opacity:.35}
.tb-left{display:flex;align-items:center;gap:14px}
.tb-logo{font-weight:700;font-size:16px;color:var(--white);display:flex;align-items:center;gap:10px}
.tb-logo-bar{width:24px;height:4px;border-radius:2px;background:var(--g)}
.tb-crumbs{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--sub);font-family:var(--jb)}
.tb-crumbs .sep{color:var(--muted)}
.tb-crumbs .cur{color:var(--white)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-search{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--elevated);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--sub);cursor:pointer;transition:border-color .15s;min-width:300px}
.tb-search:hover{border-color:#333;color:var(--text)}
.tb-search .kbd{font-family:var(--jb);font-size:10px;background:var(--bg);padding:2px 6px;border-radius:3px;border:1px solid var(--border);margin-left:auto}

.body{display:grid;grid-template-columns:220px 1fr;overflow:hidden}
.rail{background:var(--card);border-right:1px solid var(--border);padding:14px 0;overflow-y:auto}
.rail-label{padding:8px 18px;font-family:var(--jb);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.rail-tab{display:flex;align-items:center;gap:12px;padding:9px 18px 9px 14px;cursor:pointer;position:relative;color:var(--sub);font-size:13px;transition:color .12s,background .12s}
.rail-tab:hover{color:var(--text);background:var(--hover)}
.rail-tab.active{color:var(--white);background:var(--hover)}
.rail-tab.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 2px 2px 0;background:var(--gv)}
.rail-tab .num{font-family:var(--jb);font-size:11px;color:var(--muted);min-width:18px;text-align:center}
.rail-tab.active .num{color:var(--white)}
.rail-tab .name{flex:1}

.host{overflow-y:auto;padding:24px 28px 60px}
.space{display:none}
.space.active{display:block}
.space-head{margin-bottom:18px}
.space-num{font-family:var(--jb);font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.space-title{font-weight:700;font-size:26px;color:var(--white);margin-bottom:6px}
.space-desc{font-size:13px;color:var(--sub);max-width:660px}
.space-divider{height:2px;background:var(--g);opacity:.18;border-radius:1px;margin-bottom:24px}

.statusbar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;background:var(--card);border-top:1px solid var(--border);font-family:var(--jb);font-size:11px;color:var(--muted)}
.statusbar .seg{display:flex;align-items:center;gap:6px}
.statusbar .seg .lbl{color:var(--sub)}
.statusbar .seg .val{color:var(--text)}
.statusbar .right{display:flex;align-items:center;gap:18px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(63,185,80,.6)}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:6px;font-weight:600;font-size:13px;border:none;transition:all .15s;white-space:nowrap}
.btn-sm{padding:7px 16px;font-size:12px;border-radius:5px}
.btn-white{background:var(--white);color:#000}
.btn-white:hover{background:#e0e0e0}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:#444}
.btn-ghost{background:transparent;color:var(--sub)}
.btn-ghost:hover{color:var(--white)}
.btn-dark{background:var(--elevated);color:var(--text);border:1px solid var(--border)}
.btn-dark:hover{background:#181818}
.btn-icon{width:36px;height:36px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;background:var(--elevated);border:1px solid var(--border);color:var(--sub);font-size:14px}
.btn-icon:hover{color:var(--white)}

.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-grad{height:3px;background:var(--g)}
.card-body{padding:20px}
.card-title{font-weight:600;font-size:15px;color:var(--white);margin-bottom:6px}
.card-text{font-size:13px;color:var(--sub);line-height:1.7}
.card-meta{font-family:var(--jb);font-size:10px;color:var(--muted);margin-top:10px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header-title{font-weight:600;font-size:14px;color:var(--white)}

.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;background:var(--elevated);border:1px solid var(--border);color:var(--text);font-family:var(--jb);text-transform:uppercase;letter-spacing:.04em}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--sub)}
.badge-grad .badge-dot{background:var(--g135)}
.badge-line{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;color:var(--text);font-family:var(--jb);text-transform:uppercase}
.badge-line::before{content:'';width:12px;height:3px;border-radius:2px;background:var(--g)}
.badge-ok{color:var(--green)}.badge-ok .badge-dot{background:var(--green)}
.badge-bad{color:var(--red)}.badge-bad .badge-dot{background:var(--red)}
.badge-pending{color:var(--yellow)}.badge-pending .badge-dot{background:var(--yellow)}

.input{width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s;font-family:var(--sg)}
.input:focus{border-color:#333}
.input-mono{font-family:var(--jb);font-size:12px}
.input-label{display:block;font-size:12px;font-weight:600;color:var(--sub);margin-bottom:6px;letter-spacing:.02em}
.input-hint{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--jb)}
.input-group{position:relative}
.input-group .input{padding-left:36px}
.input-group-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted)}

.table-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--card)}
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:12px 16px;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;background:var(--card);border-bottom:1px solid var(--border);font-family:var(--jb)}
.table td{padding:12px 16px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle}
.table tr:last-child td{border-bottom:none}
.table tr.row-clickable{cursor:pointer}
.table tr.row-clickable:hover td{background:var(--hover)}
.mono{font-family:var(--jb);font-size:11px;color:var(--text)}
.mono-sm{font-family:var(--jb);font-size:10px;color:var(--sub)}

.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.timeline-item{position:relative;padding-bottom:20px}
.timeline-item:last-child{padding-bottom:0}
.timeline-dot{position:absolute;left:-24px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--bg)}
.timeline-dot.active{border:none;background:var(--g135);box-shadow:0 0 0 3px rgba(255,107,43,.15)}
.timeline-title{font-weight:600;font-size:14px;color:var(--white);margin-bottom:4px}
.timeline-text{font-size:13px;color:var(--sub)}
.timeline-time{font-family:var(--jb);font-size:10px;color:var(--muted);margin-top:4px}

.avatar{width:36px;height:36px;border-radius:50%;background:var(--elevated);border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--sub);flex-shrink:0}
.avatar-sm{width:28px;height:28px;font-size:11px}
.avatar-lg{width:48px;height:48px;font-size:16px}
.avatar-ring{padding:2px;background:var(--g135);border-radius:50%;display:inline-flex}
.avatar-ring .avatar{border:2px solid var(--bg)}

.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;background:var(--elevated);border:1px solid var(--border);color:var(--sub);font-family:var(--jb)}

.toggle{position:relative;width:34px;height:20px;display:inline-block;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--elevated);border:1px solid var(--border);border-radius:10px;transition:.2s;cursor:pointer}
.toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:var(--sub);border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider::before{transform:translateX(14px);background:var(--g135)}

.alert{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border-radius:8px;font-size:13px;border:1px solid var(--border);background:var(--card)}
.alert-bar{width:3px;min-height:100%;border-radius:2px;background:var(--g);flex-shrink:0;align-self:stretch}
.alert-title{font-weight:600;color:var(--white);margin-bottom:2px}
.alert-text{color:var(--sub)}

.progress-track{width:100%;height:4px;background:var(--elevated);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:var(--g);transition:width .3s}

.stat{padding:20px;background:var(--card);border:1px solid var(--border);border-radius:10px}
.stat-label{font-size:12px;color:var(--sub);font-family:var(--jb);text-transform:uppercase;letter-spacing:.08em}
.stat-value{font-size:32px;font-weight:700;color:var(--white);margin-top:6px;line-height:1.1}
.stat-sub{font-family:var(--jb);font-size:11px;color:var(--sub);margin-top:6px}
.stat-bar{width:100%;height:3px;border-radius:2px;background:var(--g);margin-top:12px}

.code-block{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:14px 16px;font-family:var(--jb);font-size:11px;color:var(--text);line-height:1.7;overflow-x:auto;white-space:pre-wrap;word-break:break-all}

.row{display:flex;gap:14px;flex-wrap:wrap}
.col{flex:1;min-width:0}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.spacer{height:24px}
.spacer-sm{height:12px}
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:10px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;width:560px;max-width:90vw;max-height:85vh;overflow:hidden;display:flex;flex-direction:column}
.modal-grad{height:3px;background:var(--g);flex-shrink:0}
.modal-header{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-weight:600;font-size:15px;color:var(--white)}
.modal-close{color:var(--muted);font-size:18px;cursor:pointer}
.modal-close:hover{color:var(--white)}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}

.cmd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;z-index:1100;padding-top:12vh}
.cmd-overlay.open{display:flex}
.cmd{background:var(--card);border:1px solid var(--border);border-radius:12px;width:560px;max-width:92vw;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.6)}
.cmd-grad{height:3px;background:var(--g)}
.cmd-input-wrap{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.cmd-prefix{font-family:var(--jb);font-size:12px;color:var(--muted)}
.cmd-input{flex:1;background:none;border:none;color:var(--white);font-size:14px;outline:none}
.cmd-input::placeholder{color:var(--muted)}
.cmd-results{max-height:340px;overflow-y:auto;padding:6px}
.cmd-item{display:flex;align-items:center;gap:12px;padding:9px 14px;border-radius:6px;cursor:pointer}
.cmd-item:hover,.cmd-item.selected{background:var(--hover)}
.cmd-item-icon{font-size:13px;color:var(--muted);width:18px;text-align:center}
.cmd-item-text{flex:1;font-size:13px;color:var(--text)}
.cmd-item-shortcut{font-family:var(--jb);font-size:10px;color:var(--muted)}
.cmd-group{padding:6px 14px;font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-family:var(--jb)}
.cmd-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:14px;font-family:var(--jb);font-size:10px;color:var(--muted)}

.toast-stack{position:fixed;right:20px;bottom:60px;display:flex;flex-direction:column;gap:8px;z-index:2000;pointer-events:none}
.toast{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;max-width:340px;font-size:12px;pointer-events:auto;animation:tin .2s ease-out;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast-bar{width:3px;min-height:24px;border-radius:2px;background:var(--g);flex-shrink:0;align-self:stretch}
.toast-text{flex:1;color:var(--text)}
@keyframes tin{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

.heat{display:grid;grid-template-columns:repeat(24,1fr);gap:3px}
.heat-cell{aspect-ratio:1;border-radius:2px;background:var(--elevated);cursor:pointer}
.heat-cell.l1{background:rgba(255,107,43,.25)}
.heat-cell.l2{background:rgba(255,34,85,.4)}
.heat-cell.l3{background:rgba(204,0,170,.6)}
.heat-cell.l4{background:rgba(136,68,255,.8)}
.heat-cell.l5{background:var(--g135)}

.cal{display:grid;grid-template-columns:repeat(53,1fr);gap:3px}
.cal-cell{width:11px;height:11px;border-radius:2px;background:var(--elevated);cursor:pointer}
.cal-cell.l1{background:rgba(255,107,43,.3)}
.cal-cell.l2{background:rgba(255,34,85,.5)}
.cal-cell.l3{background:rgba(136,68,255,.7)}
.cal-cell.l4{background:var(--g135)}
.cal-cell:hover{outline:1px solid var(--white)}

.diff-pane{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--card);font-family:var(--jb);font-size:11px}
.diff-side{padding:0;min-height:120px}
.diff-head{padding:8px 14px;font-size:10px;color:var(--sub);background:var(--bg);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.08em}
.diff-line{padding:3px 14px;line-height:1.7;white-space:pre-wrap;word-break:break-all}
.diff-add{background:rgba(63,185,80,.08);color:#7ee787;border-left:2px solid var(--green)}
.diff-rem{background:rgba(248,81,73,.08);color:#ffa198;border-left:2px solid var(--red)}
.diff-ctx{color:var(--sub)}

.signer-rail{display:flex;align-items:center;gap:10px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow-x:auto}
.signer{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:84px;flex-shrink:0;text-align:center}
.signer-name{font-size:11px;color:var(--text);font-weight:500}
.signer-state{font-family:var(--jb);font-size:9px;color:var(--muted);text-transform:uppercase}
.signer-arrow{color:var(--muted);font-size:14px;flex-shrink:0}

.score-bar{position:relative;width:80px;height:6px;background:var(--elevated);border-radius:3px;overflow:hidden}
.score-fill{position:absolute;top:0;left:0;bottom:0;background:var(--g);border-radius:3px}

.merkle{display:flex;flex-direction:column;gap:6px;font-family:var(--jb);font-size:10px;color:var(--sub)}
.merkle-step{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px}
.merkle-op{color:var(--white);font-weight:600;min-width:60px;text-transform:uppercase}

.list-pick{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.list-pick:hover{background:var(--hover)}
.list-pick.active{background:var(--hover)}
.list-pick:last-child{border-bottom:none}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--elevated);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#222}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="tb-left">
      <div class="tb-logo"><div class="tb-logo-bar"></div>BlackRoad</div>
      <div class="tb-crumbs"><span>RoadChain</span><span class="sep">/</span><span class="cur" id="crumb">Explorer</span></div>
    </div>
    <div class="tb-right">
      <div class="tb-search" onclick="openCmd()"><span>⌕</span><span>Search records, refs, kinds…</span><span class="kbd">⌘K</span></div>
      <button class="btn-icon" title="Notifications">◔</button>
      <div class="avatar avatar-sm" title="anastasia">an</div>
    </div>
  </header>
  <div class="body">
    <aside class="rail">
      <div class="rail-label">Spaces</div>
      <div id="rail-tabs"></div>
      <div class="rail-label" style="margin-top:14px">Quick</div>
      <div class="rail-tab" onclick="openCmd()"><span class="num">⌘K</span><span class="name">Command palette</span></div>
      <div class="rail-tab" onclick="anchorNow()"><span class="num">⛓</span><span class="name">Anchor head now</span></div>
      <div class="rail-tab" onclick="exportChain()"><span class="num">⇣</span><span class="name">Export NDJSON</span></div>
    </aside>
    <main class="host" id="host"></main>
  </div>
  <footer class="statusbar">
    <div class="seg"><span class="status-dot"></span><span class="lbl">chain</span> <span class="val" id="status-head">0xab12…cd34</span></div>
    <div class="right">
      <div class="seg"><span class="lbl">records</span> <span class="val" id="status-total">36</span></div>
      <div class="seg"><span class="lbl">last anchor</span> <span class="val" id="status-anchor">2h ago</span></div>
      <div class="seg"><span class="lbl">build</span> <span class="val">v0.1 · 2026-05-06</span></div>
    </div>
  </footer>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-grad"></div>
    <div class="modal-header"><div class="modal-title" id="modal-title">Title</div><div class="modal-close" onclick="closeModal()">×</div></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div class="cmd-overlay" id="cmd" onclick="if(event.target===this)closeCmd()">
  <div class="cmd">
    <div class="cmd-grad"></div>
    <div class="cmd-input-wrap">
      <span class="cmd-prefix">›</span>
      <input class="cmd-input" id="cmd-input" placeholder="Jump to a Space, search a record id…" oninput="renderCmd()" onkeydown="cmdKey(event)">
    </div>
    <div class="cmd-results" id="cmd-results"></div>

const $ = (id) => document.getElementById(id);

const SHORT = (h) => h && h.length > 14 ? h.slice(0,6) + '…' + h.slice(-4) : (h||'');
const REL = (iso) => {
  const s = (Date.now() - new Date(iso).getTime())/1000;
  if (s < 60) return Math.round(s)+'s ago';
  if (s < 3600) return Math.round(s/60)+'m ago';
  if (s < 86400) return Math.round(s/3600)+'h ago';
  return Math.round(s/86400)+'d ago';
};
const DAY  = (iso) => new Date(iso).toISOString().slice(0,10);
const HHMM = (iso) => new Date(iso).toISOString().slice(11,16);
const ESC  = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function toast(text){
  const t = el('div','toast',`<div class="toast-bar"></div><div class="toast-text">${text}</div>`);
  $('toasts').appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2400);
}
function copy(text){

const USERS = [
  {id:'u_an', name:'anastasia', init:'an'},
  {id:'u_al', name:'alice',     init:'al'},
  {id:'u_ce', name:'cecilia',   init:'ce'},

  'roadbook.publish','carpool.message','roadtrip.reply','payment.received',

];

function fakeHash(seed){
  let h = 0x811c9dc5 >>> 0;
  for (let i=0;i<seed.length;i++){ h ^= seed.charCodeAt(i); h = (Math.imul(h, 0x01000193)) >>> 0; }
  let out = '';
  for (let i=0;i<8;i++){ h = (Math.imul(h, 0x9E3779B1)) >>> 0; out += (h & 0xff).toString(16).padStart(2,'0'); out += ((h>>>8) & 0xff).toString(16).padStart(2,'0'); }
  return '0x'+out.slice(0,16);
}
function pickKind(ref, i){
  if (ref.startsWith('roadbook')) return ['roadbook.publish','note.update','version.create'][i%3];
  if (ref.startsWith('carpool'))  return 'carpool.message';
  if (ref.startsWith('roadtrip')) return 'roadtrip.reply';
  if (ref.startsWith('payment'))  return 'payment.received';
  if (ref.startsWith('file'))     return 'file.write';
  if (ref.startsWith('oracle'))   return 'oracle.attest';
  if (ref.startsWith('sign'))     return ['sign.request','sign.signed','sign.witness'][i%3];
  if (ref.startsWith('version'))  return 'version.create';
  if (ref.startsWith('chain'))    return 'chain.anchor';
  return 'note.update';
}
function buildChain(){
  const refs = [
    'roadbook:post:rb_001','roadbook:post:rb_001','roadbook:post:rb_001',
    'carpool:thread:cp_thr_042','carpool:thread:cp_thr_042','carpool:thread:cp_thr_042','carpool:thread:cp_thr_042',
    'roadtrip:reply:rt_hh21','roadtrip:reply:rt_hh21',
    'payment:c95_pay_03','payment:c95_pay_03',
    'file:notes/road-pass.md','file:notes/road-pass.md','file:notes/road-pass.md',
    'oracle:btc-usd','oracle:btc-usd','oracle:btc-usd','oracle:btc-usd',
    'sign:agreement_q2','sign:agreement_q2','sign:agreement_q2','sign:agreement_q2',
    'version:wiki/getting-started','version:wiki/getting-started','version:wiki/getting-started','version:wiki/getting-started',
    'chain:head:anchor','chain:head:anchor',
    'roadbook:post:rb_001','carpool:thread:cp_thr_042','roadtrip:reply:rt_hh21',
    'oracle:btc-usd','file:notes/road-pass.md','version:wiki/getting-started',
    'chain:head:anchor','sign:agreement_q2'
  ];
  const recs = [];
  let prev = null;
  let t = Date.now() - 18*86400*1000;
  refs.forEach((ref, i) => {
    const kind = pickKind(ref, i);
    const user = USERS[i % USERS.length].id;
    const id = fakeHash(ref + ':' + i + ':' + kind);
    const created_at = new Date(t).toISOString();
    const byte_size = 280 + (i * 41) % 1800;
    const score = (i*23 + 17) % 100;
    recs.push({ id, prev_id: prev, kind, ref, byte_size, created_at, user_id: user, score });
    prev = id;
    t += (3 + (i*53) % 14) * 3600 * 1000;
  });
  return recs;
}

function closeCmd(){ $('cmd').classList.remove('open'); }
function cmdItems(){
  const q = $('cmd-input').value.trim().toLowerCase();
  const items = [];
  SPACES.forEach(s => items.push({ group:'Spaces', icon:s.icon, label:'Go to '+s.name, sc:s.num, action:()=>{showSpace(s.key);closeCmd();} }));

  if (!q) return items;

}
function renderCmd(){
  const items = cmdItems();
  if (CMD_SEL >= items.length) CMD_SEL = 0;
  const r = $('cmd-results'); r.innerHTML = '';
  let lastGroup = null;
  items.forEach((it, i) => {
    if (it.group !== lastGroup){ r.appendChild(el('div','cmd-group',it.group)); lastGroup = it.group; }
    const row = el('div','cmd-item'+(i===CMD_SEL?' selected':''),
      `<span class="cmd-item-icon">${it.icon}</span><span class="cmd-item-text">${it.label}</span><span class="cmd-item-shortcut">${it.sc||''}</span>`);
    row.onclick = () => it.action();
    r.appendChild(row);
  });
}
function cmdKey(e){
  const items = cmdItems();
  if (e.key==='ArrowDown'){ CMD_SEL = Math.min(items.length-1, CMD_SEL+1); renderCmd(); e.preventDefault(); }
  else if (e.key==='ArrowUp'){ CMD_SEL = Math.max(0, CMD_SEL-1); renderCmd(); e.preventDefault(); }
  else if (e.key==='Enter'){ items[CMD_SEL] && items[CMD_SEL].action(); }
  else if (e.key==='Escape'){ closeCmd(); }
}
window.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); openCmd(); }

          <button class="btn btn-${r.tag?'white':'outline'} btn-sm" onclick="verRestore(${realIdx})">restore</button>
        </div>
      </div>`;
  }).join('');
  verView(d.revisions.length-1);
};
window.verView = (revIdx) => {
  VER_REV = revIdx;

  $('ver-view').innerHTML = `
    <div class="flex-between" style="margin-bottom:14px">
      <div>
        <div style="font-weight:600;color:var(--white);font-size:14px">${r.note}</div>
        <div class="mono-sm">${userOf(r.by).name} · ${DAY(r.t)} ${HHMM(r.t)}</div>
      </div>
      ${r.tag?`<span class="badge badge-grad"><span class="badge-dot"></span>${r.tag}</span>`:''}
    </div>

    <div class="spacer-sm"></div>

};
window.verRestore = (i) => {
  const d = DOCS[VER_DOC];
  const r = d.revisions[i];

  toast('Restored · new revision anchored');
  verPick(VER_DOC);
};

window.wayRender = () => {
  const ref = $('way-ref').value;
  const year = $('way-year').value;
  $('way-yearlbl').textContent = year;
  const cells = [];
  for (let w=0; w<53; w++){
    for (let d=0; d<7; d++){
      const idx = w*7+d;
      const seed = idx + ref.length + year.charCodeAt(3);
      const hasSnap = seed % 11 === 0 || seed % 7 === 3;
      const lvl = hasSnap ? ['l1','l2','l3','l4'][seed%4] : '';
      cells.push(`<div class="cal-cell ${lvl}" data-day="${idx}" onclick="wayDay(${idx},'${ref}','${year}')" title="day ${idx}${hasSnap?' · snapshots':''}"></div>`);
    }
  }
  $('way-cal').innerHTML = cells.join('');
};
window.wayDay = (idx, ref, year) => {
  const date = new Date(parseInt(year,10),0,1);
  date.setDate(date.getDate()+idx);
  const isoDay = date.toISOString().slice(0,10);
  const snaps = ['08:14','11:42','15:09','19:30'].slice(0, 1+(idx%4));
  $('way-day').innerHTML = `
    <div class="flex-between" style="margin-bottom:10px"><div style="font-weight:600;color:var(--white);font-size:13px">${isoDay} · ${ref}</div><span class="badge"><span class="badge-dot"></span>${snaps.length} snaps</span></div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${snaps.map(t=>`<button class="btn btn-dark btn-sm" onclick="wayReplay('${isoDay} ${t}','${ref}')">${t}</button>`).join('')}
    </div>`;
};
window.wayReplay = (when, ref) => {

    <div class="mono-sm" style="margin-bottom:10px">${ref}</div>

  "ref":     "${ref}",

      ${[

RENDERERS.verify = (root) => {
  root.innerHTML = `
    <div class="card" style="padding:24px;margin-bottom:18px;text-align:center;background:linear-gradient(180deg,var(--card),#080808)">
      <div style="font-size:18px;font-weight:600;color:var(--white);margin-bottom:6px">Public verifier</div>
      <div class="card-text" style="margin:0 auto 18px;max-width:520px">Paste any chain id. The verifier recomputes the canonical hash and walks the prev_id links you ask for. No auth, no body — receipts are content-addressed.</div>
      <div class="input-group" style="max-width:560px;margin:0 auto 12px"><span class="input-group-icon">⌗</span>
        <input class="input input-mono" id="verify-input" placeholder="0x… (paste a record id)" value="${HEAD}">
      </div>
      <div style="display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap">
        <label class="mono-sm" style="color:var(--sub)">walk back</label>
        <input type="range" min="0" max="64" value="4" id="verify-walk" oninput="document.getElementById('verify-walkv').textContent=this.value">
        <span class="mono" id="verify-walkv">4</span>
        <span class="mono-sm" style="color:var(--muted)">steps · 64 max</span>
        <button class="btn btn-white btn-sm" onclick="verifyId()">Verify →</button>
      </div>
    </div>
    <div id="verify-out"></div>`;
  setTimeout(verifyId, 30);
};
window.verifyId = () => {
  const id = ($('verify-input').value||'').trim();
  const walk = parseInt($('verify-walk').value||'4',10);
  const r = CHAIN.find(x => x.id === id);
  if (!r){
    $('verify-out').innerHTML = `<div class="alert"><div class="alert-bar" style="background:var(--red)"></div><div><div class="alert-title">Not found</div><div class="alert-text">No record with that id is published. Try a recent record from Explorer.</div></div></div>`;
    return;
  }
  const trail = [r];
  let cur = r;
  for (let i=0;i<walk && cur.prev_id;i++){
    const p = CHAIN.find(x => x.id === cur.prev_id);
    if (!p) break;
    trail.push(p); cur = p;
  }
  const badgeHtml =
`<a href="https://blackroad.io/api/chain/verify/${r.id}"
   class="roadchain-badge">
  ✓ verified · ${SHORT(r.id)}
</a>`;
  $('verify-out').innerHTML = `
    <div class="grid-2" style="margin-bottom:18px">
      <div class="card">
        <div class="card-grad"></div>
        <div class="card-body">
          <div class="flex-between" style="margin-bottom:10px"><div class="card-title">Receipt</div><span class="badge badge-ok"><span class="badge-dot"></span>valid</span></div>
          <div class="input-label">Id</div><div class="mono" style="cursor:pointer;word-break:break-all" onclick="copy('${r.id}')">${r.id}</div>
          <div class="spacer-sm"></div>
          <div class="grid-2">
            <div><div class="input-label">Kind</div>${badgeFor(r.kind)}</div>
            <div><div class="input-label">Bytes</div><div class="mono-sm">${r.byte_size}</div></div>
            <div><div class="input-label">Ref</div><div class="mono-sm">${r.ref}</div></div>
            <div><div class="input-label">When</div><div class="mono-sm">${r.created_at.slice(0,16).replace('T',' ')}</div></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-grad"></div>
        <div class="card-body">
          <div class="card-title" style="margin-bottom:10px">Hash recompute</div>
          <div class="merkle">
            ${[
              ['canon',  '{p,k,r,d,a,t,u}', '→', 'json'],
              ['utf8',   'encode',          '→', 'bytes'],
              ['sha256', 'digest',          '=', SHORT(r.id)],
              ['compare','vs stored id',    '=', '✓ match'],
            ].map(([op,what,eq,val])=>`<div class="merkle-step"><span class="merkle-op">${op}</span><span style="flex:1">${what}</span><span style="color:var(--muted)">${eq}</span><span style="color:var(--white)">${val}</span></div>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="input-label">Walked ${trail.length-1} step${trail.length-1===1?'':'s'} back along prev_id</div>
    <div class="card" style="padding:16px;margin-bottom:18px;max-height:420px;overflow-y:auto">
      <div class="timeline">
        ${trail.map((x,i)=>`
          <div class="timeline-item">
            <div class="timeline-dot ${i===0?'active':''}"></div>
            <div class="flex-between">
              <div style="min-width:0">
                <div class="timeline-title">${i===0?'this record':'step −'+i} · ${x.kind}</div>
                <div class="mono-sm" onclick="copy('${x.id}')" style="cursor:pointer;word-break:break-all">${x.id}</div>
              </div>
              <span class="badge badge-ok"><span class="badge-dot"></span>valid</span>
            </div>
          </div>`).join('')}
      </div>
    </div>
    <div class="grid-2">
      <div>
        <div class="input-label">Receipt JSON</div>
        <div class="code-block">${ESC(JSON.stringify({id:r.id,prev_id:r.prev_id,kind:r.kind,ref:r.ref,byte_size:r.byte_size,created_at:r.created_at,valid:true}, null, 2))}</div>
        <div class="spacer-sm"></div>
        <button class="btn btn-outline btn-sm" onclick="toast('Receipt JSON downloaded')">⇣ Download receipt</button>
      </div>
      <div>
        <div class="input-label">Embeddable badge</div>
        <div class="code-block">${ESC(badgeHtml)}</div>
        <div class="spacer-sm"></div>
        <button class="btn btn-outline btn-sm" onclick="copy('roadchain badge for ${r.id}')">Copy badge HTML</button>
      </div>
    </div>`;
};

renderRail();
renderHost();
showSpace('explorer');
$('status-head').textContent = SHORT(HEAD);
$('status-total').textContent = CHAIN.length;
</script>
